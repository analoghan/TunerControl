<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross-Tool Diagnostics — TunerControl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #ffffff; background: #0a0a0a; }
    .app-container { max-width: 1000px; margin: 0 auto; padding: 24px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333333; }
    .top-nav { display: flex; align-items: center; margin-bottom: 20px; }
    .top-nav a { color: #E31837; text-decoration: none; font-size: 0.9rem; }
    .top-nav a:hover { text-decoration: underline; color: #ff2d4a; }
    .nav-logo { height: 64px; margin-left: auto; }
    h1 { margin: 0 0 8px; font-size: 1.6rem; font-weight: 600; }
    .subtitle { color: #b0b0b0; margin: 0 0 20px; font-size: 0.95rem; }
    .file-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .file-row label { min-width: 120px; font-weight: 500; color: #b0b0b0; }
    .file-row input[type="file"]::file-selector-button { padding: 6px 14px; font-size: 0.85rem; font-weight: 500; color: #fff; background: #222; border: 1px solid #E31837; border-radius: 4px; cursor: pointer; }
    .button-row { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
    #analyze-btn { padding: 10px 28px; font-size: 1rem; font-weight: 600; color: #fff; background: #E31837; border: none; border-radius: 4px; cursor: pointer; }
    #analyze-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    #analyze-btn:hover:not(:disabled) { background: #ff2d4a; }
    .progress-section { margin: 16px 0; }
    .progress-bar-track { width: 100%; height: 22px; background: #222; border-radius: 11px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #E31837, #ff2d4a); border-radius: 11px; transition: width 0.3s; }
    .progress-text { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.85rem; color: #b0b0b0; }
    .error-banner { background: rgba(244,67,54,0.15); border: 1px solid #f44336; border-radius: 4px; padding: 12px 16px; margin: 16px 0; color: #f44336; font-weight: 500; }
    .results-section { margin-top: 20px; }
    .finding { background: #111; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
    .finding-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .finding-severity { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .severity-critical { background: rgba(244,67,54,0.2); color: #f44336; }
    .severity-warning { background: rgba(255,152,0,0.2); color: #ff9800; }
    .severity-info { background: rgba(33,150,243,0.2); color: #2196f3; }
    .severity-healthy { background: rgba(76,175,80,0.2); color: #4caf50; }
    .finding-title { font-weight: 600; font-size: 0.95rem; }
    .finding-body { color: #b0b0b0; font-size: 0.9rem; }
    .finding-body p { margin: 4px 0; }
    .finding-action { margin-top: 8px; padding: 8px 12px; background: rgba(76,175,80,0.1); border-left: 3px solid #4caf50; border-radius: 0 4px 4px 0; color: #cccccc; font-size: 0.85rem; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .summary-stat { background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; text-align: center; }
    .summary-stat .stat-value { display: block; font-size: 1.3rem; font-weight: 700; color: #fff; }
    .summary-stat .stat-label { display: block; font-size: 0.8rem; color: #888; margin-top: 4px; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav">
      <a href="../index.html">&larr; Back to TunerControl</a>
      <img src="../TunerControlLogo.png" alt="TunerControl" class="nav-logo">
    </nav>

    <h1>Cross-Tool Diagnostics</h1>
    <p class="subtitle">Load a single MoTeC log file for unified analysis across fueling, knock, fuel pressure, and idle behavior. Identifies correlated root causes rather than isolated symptoms.</p>

    <div class="file-row">
      <label for="log-input">MoTeC Log File:</label>
      <input type="file" id="log-input" accept=".csv,.ld" />
    </div>
    <div class="button-row">
      <button id="analyze-btn" disabled>Analyze All</button>
    </div>

    <div id="error-container" class="error-banner" hidden></div>

    <div id="progress-section" class="progress-section" hidden>
      <div class="progress-bar-track">
        <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <div class="progress-text">
        <span id="progress-pct">0%</span>
        <span id="progress-phase"></span>
      </div>
    </div>

    <div id="results-section" class="results-section" hidden>
      <h2>Diagnostic Summary</h2>
      <div id="summary-grid" class="summary-grid"></div>
      <h2>Findings</h2>
      <div id="findings-container"></div>
    </div>
  </div>

  <script src="worker-diagnostics.js"></script>
  <script src="app.js"></script>
</body>
</html>
